name: Cypress Cloud CI 🚀
on: [push]
jobs:
  cypress-run:
    runs-on: ubuntu-latest # Ambiente Linux idêntico ao validado no Cloud
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Cypress run 🌲
        uses: cypress-io/github-action@v6
        with:
          record: true
        env:

          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
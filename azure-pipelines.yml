trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Instalar Node.js'

  - script: |
      npm install
    displayName: 'Instalar Dependências'

  - script: |
      npx cypress run
    displayName: 'Executar Testes E2E (Cypress)'
    env:

      CI: true